<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moments from the Assembly</title>
   <link rel="stylesheet" type="text/css" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f9f9f9;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }
    .gallery figure {
      margin: 0;
      background: #fff;
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }
    .gallery img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .gallery figcaption {
      margin-top: 8px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body class="gallery-page">
  <nav>
    <a href="index.html" class="home-link">Home</a>
    <a href="about.html" class="about-link">About</a>
    <a href="story.html" class="story-link">Story</a>
    <a href="gallery.html" class="gallery-link">Gallery</a>
    <a href="contact.html" class="contact-link">Contact</a>
  </nav>
  <h1>Image Gallery</h1>
  <section class="gallery">
    <figure>
      <img src="images/photo1.jpg.jpeg" alt="SRC President ">
      <figcaption>Leadership: The SRC President Jerome !Nanuseb</figcaption>
    </figure>
    <figure>
      <img src="images/food.jpg.jpeg" alt="burger">
      <figcaption> Refreshments: The students that attended the GSA received burgers and a drink of their choice.</figcaption>
    </figure>
    <figure>
      <img src="images/hello.jpg.jpeg" alt="discussing">
      <figcaption>The leaders discussing on the matters brought forward by the students</figcaption>
    </figure>
    <figure>
      <img src="images/assembly.jpg.jpeg" alt="invitation">
      <figcaption>Spread the word: the GSA invitation</figcaption>
    </figure>
	<figure>
      <img src="images/qrcode.jpg.jpeg" alt="QR code">
      <figcaption>Scan the QR code to get the assembly minutes</figcaption>
    </figure>
  </section>
</body>
</html>
